<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@font-face { font-family:'Orbitron'; src:url('../assets/fonts/Orbitron-VariableFont_wght.ttf') format('truetype'); font-weight:400 900; font-display:swap; }
@font-face { font-family:'Roboto';   src:url('../assets/fonts/Roboto-VariableFont_wdth,wght.ttf') format('truetype'); font-weight:100 900; font-display:swap; }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070707;background-image:linear-gradient(rgba(212,255,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(212,255,0,0.025) 1px,transparent 1px);background-size:32px 32px;padding:16px;font-family:'Roboto',sans-serif;}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;margin-bottom:16px;align-items:end;}
.token{text-align:center;}
.bar{background:#d4ff00;min-height:4px;clip-path:polygon(0 0,calc(100% - 3px) 0,100% 3px,100% 100%,0 100%);}
.nm{font-family:'Orbitron',sans-serif;font-size:8px;color:#6c6c68;letter-spacing:0.06em;margin-top:5px;text-transform:uppercase;}
.vl{font-family:'Roboto Mono','Courier New',monospace;font-size:8px;color:#333330;margin-top:2px;}
.label{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6c6c68;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.label::before{content:'';display:block;width:3px;height:12px;background:#d4ff00;flex-shrink:0;}
</style>
</head>
<body>
  <div class="label">Spacing — 4px base unit</div>
  <div class="grid">
    <div class="token"><div class="bar" style="height:4px;opacity:.25;"></div><div class="nm">sp-1</div><div class="vl">4px</div></div>
    <div class="token"><div class="bar" style="height:8px;opacity:.35;"></div><div class="nm">sp-2</div><div class="vl">8px</div></div>
    <div class="token"><div class="bar" style="height:12px;opacity:.45;"></div><div class="nm">sp-3</div><div class="vl">12px</div></div>
    <div class="token"><div class="bar" style="height:16px;opacity:.55;"></div><div class="nm">sp-4</div><div class="vl">16px</div></div>
    <div class="token"><div class="bar" style="height:24px;opacity:.6;"></div><div class="nm">sp-6</div><div class="vl">24px</div></div>
    <div class="token"><div class="bar" style="height:32px;opacity:.65;"></div><div class="nm">sp-8</div><div class="vl">32px</div></div>
    <div class="token"><div class="bar" style="height:48px;opacity:.75;"></div><div class="nm">sp-12</div><div class="vl">48px</div></div>
    <div class="token"><div class="bar" style="height:64px;opacity:.82;"></div><div class="nm">sp-16</div><div class="vl">64px</div></div>
    <div class="token"><div class="bar" style="height:80px;opacity:.9;"></div><div class="nm">sp-24</div><div class="vl">96px</div></div>
    <div class="token"><div class="bar" style="height:96px;opacity:1;"></div><div class="nm">sp-32</div><div class="vl">128px</div></div>
  </div>
</body>
</html>
