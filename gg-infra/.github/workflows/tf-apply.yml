name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "live/**"
      - "modules/**"
      - "terragrunt.hcl"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.67.16"
  AWS_REGION: "us-east-1"

jobs:
  apply:
    name: Terragrunt Apply
    runs-on: ubuntu-latest
    environment: dev    # requires manual approval in GitHub Environments settings
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gg-gaming-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Apply
        working-directory: live/dev
        run: |
          terragrunt run-all apply \
            --terragrunt-non-interactive \
            --terragrunt-parallelism 4
