name: Terraform Plan

on:
  pull_request:
    paths:
      - "live/**"
      - "modules/**"
      - "terragrunt.hcl"

permissions:
  id-token: write    # OIDC token for AWS auth
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  TG_VERSION: "0.67.16"
  AWS_REGION: "us-east-1"

jobs:
  plan:
    name: Terragrunt Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          wget -q "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64"
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt
          terragrunt --version

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gg-gaming-github-actions-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Terragrunt Plan
        id: plan
        working-directory: live/dev
        run: |
          terragrunt run-all plan \
            --terragrunt-non-interactive \
            --terragrunt-parallelism 4 \
            2>&1 | tee /tmp/plan-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.slice(0, 60000) + '\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terragrunt Plan\n\`\`\`\n${truncated}\n\`\`\``
            });
