apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gg-hello-world
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/diegox-acf/gg-infra.git
    targetRevision: main
    path: k8s/hello-world
  destination:
    server: https://kubernetes.default.svc
    namespace: gg-hello-world
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
