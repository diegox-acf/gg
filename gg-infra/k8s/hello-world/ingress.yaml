apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gg-hello-world
  namespace: gg-hello-world
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: ""   # fill in after cert-manager issues the cert
spec:
  ingressClassName: alb
  rules:
    - host: hello.dev.gaming.gg
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gg-hello-world
                port:
                  number: 80
