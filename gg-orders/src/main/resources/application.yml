spring:
  application:
    name: gg-orders

  # Virtual threads (Java 21) — one carrier-free thread per request. Spring Boot 3.5
  # wires this through Tomcat, @Async, and the task executors.
  threads:
    virtual:
      enabled: true

  datasource:
    # Native dev points at postgres-orders mapped to host 5433; the container
    # override (DATABASE_URL / SPRING_DATASOURCE_URL) targets postgres-orders:5432.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/gg_orders}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    # Flyway owns the schema; JPA only validates that entities match it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # snake_case JSON across the platform (matches Catalog / the BFF contract).
  jackson:
    property-naming-strategy: SNAKE_CASE

  # Kafka — the outbox poller publishes events (ADR-019 producer durability). The broker
  # host listener is localhost:9092 natively; the container override targets kafka:29092.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all                       # ack only after in-sync replicas have it
      properties:
        enable.idempotence: true      # dedup producer retries (the idempotent-producer half of EOS)
        max.in.flight.requests.per.connection: 5   # ordering preserved under idempotence
    consumer:
      group-id: gg-orders
      auto-offset-reset: earliest
      enable-auto-commit: false       # the container commits offsets after processing (ADR-019)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        isolation.level: read_committed

server:
  port: ${SERVER_PORT:8083}

# Catalog service — authoritative product prices are re-fetched at order creation.
catalog:
  base-url: ${CATALOG_BASE_URL:http://localhost:8080}

# Inventory service — the saga reserves stock here over synchronous REST (ADR-018).
inventory:
  base-url: ${INVENTORY_BASE_URL:http://localhost:8082}

# Order pricing constants (02-business-logic.md). Cents/bps to avoid float drift.
orders:
  tax-bps: 800            # 8.00% sales tax
  shipping-cents: 999     # flat $9.99 shipping
  # Outbox relay (Milestone C). Fixed-delay poll; FOR UPDATE SKIP LOCKED batch.
  outbox:
    poll-delay-ms: 1000
    batch-size: 100
    send-timeout-ms: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
