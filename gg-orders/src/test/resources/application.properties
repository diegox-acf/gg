# Tests load the full app context; keep the outbox poller and Kafka consumer off by
# default so they never reach for a broker. The dedicated integration tests re-enable
# the one they exercise against a real Kafka (Testcontainers).
orders.outbox.enabled=false
orders.consumer.enabled=false
# Recovery worker off in tests — it would scan + reconcile against Stripe on a timer.
orders.recovery.enabled=false
