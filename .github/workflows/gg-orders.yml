name: gg-orders — CI

on:
  push:
    branches:
      - 'gg-orders/**'
  pull_request:
    branches:
      - main
    paths:
      - 'gg-orders/**'
      - 'gg-proto/gen/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        working-directory: gg-orders
        run: ./gradlew test

      - name: Build
        working-directory: gg-orders
        run: ./gradlew build -x test

      - name: Docker build
        run: docker build -t gg-orders:${{ github.sha }} gg-orders
