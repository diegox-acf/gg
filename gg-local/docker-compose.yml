services:

  # ───────────────────────────────────────────────────────────────
  # Databases — one per bounded context (private DB per service)
  # ───────────────────────────────────────────────────────────────
  postgres-catalog:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gg_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-orders:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gg_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-inventory:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: gg_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-keycloak:
    image: postgres:17-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───────────────────────────────────────────────────────────────
  # Identity — Keycloak (OIDC). Realm `gg` imported on first boot.
  # See ADR-005 (finalized: Keycloak chosen over Cognito).
  # ───────────────────────────────────────────────────────────────
  keycloak:
    # Pinned (latest-tag drift bites — see Tempo). 26.x is the current stable line.
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    ports:
      - "8081:8080"    # 8080 is the catalog service
    environment:
      # Bootstrap admin (26.x env names; creates the master-realm admin)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Persist to Postgres so registered users survive restarts
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres-keycloak:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────
  # Cache
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───────────────────────────────────────────────────────────────
  # Event streaming
  # ───────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"    # PLAINTEXT — host tools and natively-running services
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      # Two listeners: PLAINTEXT (host-facing), INTERNAL (container-to-container)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      # Topics are provisioned explicitly by the kafka-init service; disable auto-create
      # so an unknown topic name fails loudly instead of silently auto-spawning (ADR-019).
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # One-shot topic provisioner. Topics are code-owned here (ADR-013: compose is the
  # infra truth) rather than relying on broker auto-create, so partitions are explicit
  # and a typo'd topic name fails loudly instead of silently spawning a 1-partition topic.
  # RF=1 / MIN_ISR=1 is the single-broker local stance (ADR-019); production uses RF>=3,
  # min.insync.replicas=2. Each domain topic gets a matching .dlq (3 retries -> DLQ).
  kafka-init:
    image: apache/kafka:4.2.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        BS=kafka:29092
        create() { /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$$BS" \
          --create --if-not-exists --topic "$$1" --partitions "$$2" --replication-factor 1; }
        for t in orders.order-created orders.order-cancelled \
                 inventory.stock-reserved inventory.stock-released; do
          create "$$t" 3
          create "$$t.dlq" 1
        done
        echo "---- topics ----"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$$BS" --list
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────
  # Observability — OTel → Tempo (traces) + Prometheus (metrics) + Loki (logs) → Grafana
  # ───────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"    # OTLP gRPC — all services send here
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    # Pinned: `latest` currently resolves to a 3.0 release candidate whose config
    # schema rejects this file (ingester/compactor blocks moved). 2.6.x is stable.
    image: grafana/tempo:2.6.1
    # Run as root: Tempo's image user can't create block dirs in the root-owned
    # named volume otherwise (mkdir /tmp/tempo/blocks: permission denied). Fine
    # for local dev.
    user: root
    ports:
      - "3200:3200"    # HTTP — Grafana datasource endpoint
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo.yaml"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"    # 3000 is reserved for Next.js storefront
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ───────────────────────────────────────────────────────────────
  # Application services (add as they are containerized)
  # ───────────────────────────────────────────────────────────────
  
  catalog:
    build: 
      context: ../gg-catalog
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres-catalog:5432/gg_catalog
      IMAGE_STORE_TYPE: local
      IMAGE_STORE_PATH: /data/images
      IMAGE_BASE_URL: http://localhost:8080
      # Optional JWT validation (ADR-017). In-container issuer differs from host:
      OIDC_ISSUER: http://keycloak:8080/realms/gg
    volumes:
      - ./volumes/images:/data/images
    depends_on:
      postgres-catalog:
        condition: service_healthy
  
  inventory:
    build: 
      context: ../gg-inventory
      dockerfile: docker/Dockerfile
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres-inventory:5432/gg_inventory
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4318
      # In-network broker (host listener is localhost:9092; container uses kafka:29092)
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres-inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # NOTE: migrations are run separately (`make -C ../gg-inventory migrate-up`)
    #       against host port 5434, not auto-applied on startup.
  
  orders:
    build:
      context: ../gg-orders
      dockerfile: docker/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-orders:5432/gg_orders
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      CATALOG_BASE_URL: http://catalog:8080
      # OpenTelemetry Java agent → collector (traces + metrics + logs)
      OTEL_SERVICE_NAME: gg-orders
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_LOGS_EXPORTER: otlp
      # In-network broker (host listener is localhost:9092; container uses kafka:29092)
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-orders:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # Flyway migrations auto-apply on startup (unlike the Go services).

volumes:
  postgres_catalog_data:
  postgres_orders_data:
  postgres_inventory_data:
  postgres_keycloak_data:
  kafka_data:
  prometheus_data:
  tempo_data:
  grafana_data:
