services:

  # ───────────────────────────────────────────────────────────────
  # Databases — one per bounded context (private DB per service)
  # ───────────────────────────────────────────────────────────────
  postgres-catalog:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gg_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-orders:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gg_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_orders_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-inventory:
    image: postgres:17-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: gg_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───────────────────────────────────────────────────────────────
  # Cache
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───────────────────────────────────────────────────────────────
  # Event streaming
  # ───────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:4.2.0
    ports:
      - "9092:9092"    # PLAINTEXT — host tools and natively-running services
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      # Two listeners: PLAINTEXT (host-facing), INTERNAL (container-to-container)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────
  # Observability — OTel → Tempo (traces) + Prometheus (metrics) + Loki (logs) → Grafana
  # ───────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"    # OTLP gRPC — all services send here
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector-config.yaml
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    # Pinned: `latest` currently resolves to a 3.0 release candidate whose config
    # schema rejects this file (ingester/compactor blocks moved). 2.6.x is stable.
    image: grafana/tempo:2.6.1
    # Run as root: Tempo's image user can't create block dirs in the root-owned
    # named volume otherwise (mkdir /tmp/tempo/blocks: permission denied). Fine
    # for local dev.
    user: root
    ports:
      - "3200:3200"    # HTTP — Grafana datasource endpoint
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    command: ["-config.file=/etc/tempo.yaml"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"    # 3000 is reserved for Next.js storefront
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ───────────────────────────────────────────────────────────────
  # Application services (add as they are containerized)
  # ───────────────────────────────────────────────────────────────
  #
  # catalog:
  #   build: ../gg-catalog
  #   ports:
  #     - "8080:8080"
  #     - "9090:9090"
  #   environment:
  #     DATABASE_URL: postgres://postgres:postgres@postgres-catalog:5432/gg_catalog
  #     IMAGE_STORE_TYPE: local
  #     IMAGE_STORE_PATH: /data/images
  #     IMAGE_BASE_URL: http://localhost:8080
  #   volumes:
  #     - ./volumes/images:/data/images
  #   depends_on:
  #     postgres-catalog:
  #       condition: service_healthy

volumes:
  postgres_catalog_data:
  postgres_orders_data:
  postgres_inventory_data:
  kafka_data:
  prometheus_data:
  tempo_data:
  grafana_data:
