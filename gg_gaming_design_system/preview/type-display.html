<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@font-face { font-family:'Orbitron'; src:url('../assets/fonts/Orbitron-VariableFont_wght.ttf') format('truetype'); font-weight:400 900; font-display:swap; }
@font-face { font-family:'Roboto';   src:url('../assets/fonts/Roboto-VariableFont_wdth,wght.ttf') format('truetype'); font-weight:100 900; font-display:swap; }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#070707;background-image:linear-gradient(rgba(212,255,0,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(212,255,0,0.025) 1px,transparent 1px);background-size:32px 32px;padding:20px;}
@keyframes heroGlitch{0%,100%{transform:translate(0,0)}20%{transform:translate(-3px,0)}40%{transform:translate(3px,0);filter:brightness(1.2)}60%{transform:translate(-1px,0)}80%{transform:translate(1px,0)}}
</style>
</head>
<body>
  <div style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:72px;line-height:0.9;text-transform:uppercase;letter-spacing:-0.02em;color:#f0f0ec;margin-bottom:6px;">BUILT TO</div>

  <div style="font-family:'Roboto',sans-serif;font-size:14px;color:#6c6c68;margin-bottom:24px;letter-spacing:0.06em;text-transform:uppercase;">Orbitron 900 · Display / Hero scale</div>
  <div style="height:1px;background:#1e1e1e;margin-bottom:18px;"></div>
  <div style="display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap;">
    <div>
      <div style="font-family:'Roboto Mono','Courier New',monospace;font-size:9px;color:#333330;margin-bottom:5px;">h1 · 32px · Orbitron 900</div>
      <div style="font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;text-transform:uppercase;color:#f0f0ec;letter-spacing:0.02em;">Your Next Build</div>
    </div>
    <div>
      <div style="font-family:'Roboto Mono','Courier New',monospace;font-size:9px;color:#333330;margin-bottom:5px;">h2 · 16px · Orbitron 700</div>
      <div style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;text-transform:uppercase;color:#f0f0ec;letter-spacing:0.1em;">Featured Products</div>
    </div>
    <div>
      <div style="font-family:'Roboto Mono','Courier New',monospace;font-size:9px;color:#333330;margin-bottom:5px;">label · 10px · Orbitron 600</div>
      <div style="font-family:'Orbitron',sans-serif;font-weight:600;font-size:10px;text-transform:uppercase;color:#d4ff00;letter-spacing:0.16em;">Add to Cart</div>
